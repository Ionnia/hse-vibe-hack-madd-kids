services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: tutor
      POSTGRES_PASSWORD: tutor
      POSTGRES_DB: tutor
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tutor"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    ports:
      - "8001:8000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://tutor:tutor@postgres:5432/tutor
      DATABASE_URL_SYNC: postgresql://tutor:tutor@postgres:5432/tutor
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - uploads:/app/uploads
    restart: unless-stopped

  bot:
    build:
      context: .
      dockerfile: Dockerfile.bot
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://tutor:tutor@postgres:5432/tutor
      DATABASE_URL_SYNC: postgresql://tutor:tutor@postgres:5432/tutor
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - uploads:/app/uploads
    restart: unless-stopped

  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://tutor:tutor@postgres:5432/tutor
      DATABASE_URL_SYNC: postgresql://tutor:tutor@postgres:5432/tutor
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - uploads:/app/uploads
      - whisper_cache:/root/.cache/huggingface
    restart: unless-stopped

  beat:
    build:
      context: .
      dockerfile: Dockerfile.worker
    command: ["celery", "-A", "app.tasks.celery_app", "beat", "--loglevel=info"]
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://tutor:tutor@postgres:5432/tutor
      DATABASE_URL_SYNC: postgresql://tutor:tutor@postgres:5432/tutor
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  uploads:
  whisper_cache:
